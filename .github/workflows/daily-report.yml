name: 日次売上レポート配信

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 21:00 JST
  workflow_dispatch:         # 手動実行用

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download CSVs from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python download_data.py

      - name: Generate report and send email
        env:
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_URL: "https://aruku000.github.io/kpi-sales-report/"
          SLIDES_PRESENTATION_ID: ${{ secrets.SLIDES_PRESENTATION_ID }}
        run: python send_report.py

      - name: Deploy HTML to GitHub Pages
        run: |
          mkdir -p docs
          cp report_template.html docs/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update report $(date -u +%Y-%m-%d)"
          git push
